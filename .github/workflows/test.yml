name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poaley_chedec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: .
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/poaley_chedec_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/poaley_chedec_test
      SECRET_KEY: test-secret-key
      ENVIRONMENT: test
      TIMEZONE: Asia/Jerusalem
      ZMANIM_LATITUDE: "31.669"
      ZMANIM_LONGITUDE: "34.571"
      ZMANIM_TZID: Asia/Jerusalem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest
